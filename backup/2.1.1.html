<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2.1 数据采集认知 · 闯关挑战</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#080B1A;--bg2:#0D1130;
--surface:rgba(255,255,255,.055);--border:rgba(255,255,255,.11);
--gold:#FFD700;--gold2:#FFA500;
--teal:#00E5CC;--pink:#FF6B9D;--purple:#C77DFF;
--blue:#74B9FF;--green:#00E676;--red:#FF5252;
--cyan:#00D4FF;--orange:#FF9500;
--text:#F0F0FF;--muted:rgba(240,240,255,.52);--r:20px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
canvas#stars{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ====== 三屏 ====== */
.screen{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}
.screen.active{display:flex}

/* ====== 登录屏 ====== */
.login-box{background:linear-gradient(135deg,rgba(13,17,48,.92),rgba(8,11,26,.96));border:1px solid var(--border);border-radius:var(--r);padding:44px 36px;max-width:440px;width:100%;text-align:center;backdrop-filter:blur(20px)}
.game-logo{width:94px;height:94px;margin:0 auto 18px;border-radius:50%;background:linear-gradient(135deg,#0891B2,#00E5CC);display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 0 36px rgba(0,229,204,.25)}
.ltitle{font-family:'ZCOOL KuaiLe',cursive;font-size:28px;background:linear-gradient(90deg,var(--teal),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.lsub{color:var(--muted);font-size:15px;margin-bottom:8px}
.lmod{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.lmod .kw{font-size:12px;padding:4px 14px;border-radius:30px;background:rgba(0,229,204,.08);border:1px solid rgba(0,229,204,.2);color:var(--teal)}
.badge-row{display:flex;justify-content:center;gap:10px;margin-bottom:26px;flex-wrap:wrap}
.bdg{font-size:12px;padding:5px 14px;border-radius:30px;font-weight:700}
.bdg.s{background:rgba(116,185,255,.13);color:var(--blue);border:1px solid rgba(116,185,255,.25)}
.bdg.m{background:rgba(199,125,255,.13);color:var(--purple);border:1px solid rgba(199,125,255,.25)}
.bdg.j{background:rgba(255,107,157,.13);color:var(--pink);border:1px solid rgba(255,107,157,.25)}
.inp-g{text-align:left;margin-bottom:16px}
.inp-g label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.inp-g input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;outline:none;transition:border .3s}
.inp-g input:focus{border-color:var(--teal)}
.start-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--teal),#009688);color:#fff;font-size:17px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;margin-top:6px;transition:transform .2s,box-shadow .2s;letter-spacing:2px}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,229,204,.35)}
.rule-box{margin-top:18px;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px}
.rule-box h4{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;color:var(--teal);margin-bottom:6px}
.rule-box p{font-size:12px;color:var(--muted);line-height:1.7}

/* ====== 游戏屏 ====== */
.game-top{width:100%;max-width:700px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:10px}
.info-row .uname{color:var(--teal);font-size:13px}
.timer{font-family:'ZCOOL KuaiLe',cursive;font-size:16px;color:var(--cyan);display:flex;align-items:center;gap:5px}
.score-show{font-family:'ZCOOL KuaiLe',cursive;font-size:20px;color:var(--gold)}
.pg-bar{width:100%;height:8px;background:var(--surface);border-radius:10px;overflow:hidden}
.pg-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--cyan));border-radius:10px;transition:width .5s}
.dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:14px 0 10px}
.dot{width:18px;height:18px;border-radius:50%;background:var(--surface);border:2px solid var(--border);font-size:8px;display:flex;align-items:center;justify-content:center;transition:all .35s;color:var(--muted)}
.dot.cur{border-color:var(--teal);box-shadow:0 0 8px rgba(0,229,204,.4);background:rgba(0,229,204,.15);color:var(--teal)}
.dot.ok{background:var(--green);border-color:var(--green);color:#fff}
.dot.no{background:var(--red);border-color:var(--red);color:#fff}
.dot.skip{background:rgba(255,149,0,.35);border-color:var(--orange);color:#fff}

.q-card{background:linear-gradient(135deg,rgba(13,17,48,.85),rgba(8,11,26,.92));border:1px solid var(--border);border-radius:var(--r);padding:34px 30px;max-width:700px;width:100%;backdrop-filter:blur(12px)}
.q-type{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:14px}
.q-type.s{background:rgba(116,185,255,.13);color:var(--blue)}
.q-type.m{background:rgba(199,125,255,.13);color:var(--purple)}
.q-type.j{background:rgba(255,107,157,.13);color:var(--pink)}
.q-num{color:var(--muted);font-size:13px;margin-bottom:6px}
.q-text{font-size:17px;font-weight:700;line-height:1.7;margin-bottom:22px}
.q-note{font-size:13px;color:var(--orange);background:rgba(255,149,0,.08);border:1px dashed rgba(255,149,0,.25);border-radius:10px;padding:8px 14px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .3s;user-select:none}
.opt:hover{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.08)}
.opt.sel{border-color:var(--purple);background:rgba(199,125,255,.1)}
.opt.ok{border-color:var(--green);background:rgba(0,230,118,.1)}
.opt.no{border-color:var(--red);background:rgba(255,82,82,.1);opacity:.7}
.opt.hi{border-color:var(--green);background:rgba(0,230,118,.08);border-style:dashed}
.opt .olet{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;transition:all .3s}
.opt.sel .olet{background:var(--purple);color:#fff}
.opt.ok .olet{background:var(--green);color:#fff}
.opt.no .olet{background:var(--red);color:#fff}
.opt.hi .olet{background:rgba(0,230,118,.3);color:var(--green)}
.opt .otxt{font-size:15px;line-height:1.5}
.opt.disabled{pointer-events:none}
.exp-box{margin-top:18px;padding:16px 20px;border-radius:14px;font-size:14px;line-height:1.7;display:none}
.exp-box.show{display:block;animation:fadeUp .4s ease}
.exp-box.ok{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:#b9f6ca}
.exp-box.no{background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.2);color:#ffcdd2}
@keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}

/* ====== 按钮区 ====== */
.btn-row{display:flex;justify-content:center;gap:14px;margin-top:20px;max-width:700px;width:100%;flex-wrap:wrap}
.g-btn{padding:13px 36px;border:none;border-radius:14px;font-size:15px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;transition:all .25s;letter-spacing:1px;display:inline-flex;align-items:center;gap:8px}
.g-btn.submit{background:linear-gradient(135deg,var(--teal),#009688);color:#fff}
.g-btn.submit:hover{box-shadow:0 4px 18px rgba(0,229,204,.3);transform:translateY(-2px)}
.g-btn.submit:disabled{opacity:.35;pointer-events:none;transform:none;box-shadow:none}
.g-btn.next{background:linear-gradient(135deg,var(--blue),#5b8def);color:#fff}
.g-btn.next:hover{box-shadow:0 4px 18px rgba(116,185,255,.3);transform:translateY(-2px)}
.g-btn.skip{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.g-btn.skip:hover{border-color:var(--orange);color:var(--orange);background:rgba(255,149,0,.06)}
.g-btn.finish{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1a2e;font-weight:700}
.g-btn.finish:hover{box-shadow:0 4px 18px rgba(255,215,0,.35);transform:translateY(-2px)}
.g-btn.hide{display:none!important}

/* ====== 结果屏 ====== */
.result-box{background:linear-gradient(135deg,rgba(13,17,48,.92),rgba(8,11,26,.96));border:1px solid var(--border);border-radius:var(--r);padding:44px 36px;max-width:540px;width:100%;text-align:center;backdrop-filter:blur(20px)}
.r-emoji{font-size:64px;margin-bottom:10px;animation:bounce 1s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.r-title{font-family:'ZCOOL KuaiLe',cursive;font-size:28px;margin-bottom:6px}
.r-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.r-score{font-family:'ZCOOL KuaiLe',cursive;font-size:56px;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.35)}
.r-total{color:var(--muted);font-size:14px;margin-bottom:20px}
.r-stars{margin-bottom:18px;font-size:32px;letter-spacing:6px}
.r-stats{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:24px}
.r-stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px;min-width:90px;text-align:center}
.r-stat .v{font-family:'ZCOOL KuaiLe',cursive;font-size:22px;margin-bottom:2px}
.r-stat .l{font-size:12px;color:var(--muted)}
.r-detail{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:22px;max-height:260px;overflow-y:auto}
.r-detail::-webkit-scrollbar{width:5px}
.r-detail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.13);border-radius:9px}
.r-d-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6}
.r-d-item:last-child{border-bottom:none}
.r-d-item .ico{flex-shrink:0;margin-top:2px;font-size:15px}
.r-d-item .dtxt{flex:1}
.r-d-item .dtxt b{color:var(--text)}
.r-d-item .dtxt .dexp{color:var(--muted);font-size:12px;margin-top:2px}
.r-btn-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.retry-btn{padding:14px 40px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--teal),#009688);color:#fff;font-size:17px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;transition:all .25s;letter-spacing:2px;display:inline-flex;align-items:center;gap:8px}
.retry-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,229,204,.35)}
.home-btn{padding:14px 30px;border:1.5px solid var(--border);border-radius:14px;background:transparent;color:var(--muted);font-size:15px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;transition:all .25s}
.home-btn:hover{border-color:var(--text);color:var(--text)}

/* ====== 动画 ====== */
.combo-t{position:fixed;top:18%;left:50%;transform:translateX(-50%);font-family:'ZCOOL KuaiLe',cursive;font-size:28px;color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,.5);z-index:999;display:none;pointer-events:none}
@keyframes cIn{0%{opacity:0;transform:translateX(-50%) scale(.5) translateY(20px)}15%{opacity:1;transform:translateX(-50%) scale(1.15) translateY(0)}30%{transform:translateX(-50%) scale(1) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-40px)}}
.score-fly{position:fixed;pointer-events:none;z-index:999;font-family:'ZCOOL KuaiLe',cursive;font-size:24px;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.4);animation:sfly 1.2s ease-out forwards}
@keyframes sfly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.3)}}
.ptc{position:fixed;pointer-events:none;z-index:999;font-size:22px;animation:ptcfly 2s ease-out forwards}
@keyframes ptcfly{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-200px) scale(0);opacity:0}}

/* ====== 响应式 ====== */
@media(max-width:600px){
.login-box,.q-card,.result-box{padding:28px 18px}
.ltitle{font-size:22px}
.q-text{font-size:15px}
.r-score{font-size:44px}
.dots{gap:4px}.dot{width:15px;height:15px;font-size:7px}
.r-stats{gap:8px}.r-stat{min-width:70px;padding:10px 12px}
.btn-row{gap:10px}.g-btn{padding:12px 22px;font-size:13px}
.opt{padding:12px 14px;gap:10px}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="combo-t" id="comboT"></div>

<!-- ==================== 登录屏 ==================== -->
<div class="screen active" id="sLogin">
<div class="login-box">
  <div class="game-logo">🗂️</div>
  <div class="ltitle">基础数据采集 · 闯关</div>
  <div class="lsub">单元一 · 数据采集认知</div>
  <div class="lmod">
    <span class="kw">📌 概念</span>
    <span class="kw">📏 原则</span>
    <span class="kw">🔧 方法</span>
    <span class="kw">👣 步骤</span>
  </div>
  <div class="badge-row">
    <span class="bdg s">📘 单选 ×10</span>
    <span class="bdg m">📗 多选 ×5</span>
    <span class="bdg j">📙 判断 ×5</span>
  </div>
  <div class="inp-g"><label>🎓 学号</label><input id="iId" placeholder="请输入学号" maxlength="20"></div>
  <div class="inp-g"><label>✏️ 姓名</label><input id="iName" placeholder="请输入姓名" maxlength="12"></div>
  <button class="start-btn" onclick="startGame()">⚡ 开始闯关</button>
  <div class="rule-box">
    <h4>📋 闯关规则</h4>
    <p>共 20 题：单选（5分/题）、多选（10分/题）、判断（5分/题），满分 100 分。<br>连续答对 3 题及以上触发 🔥 连击特效！可跳过不确定的题目。</p>
  </div>
</div>
</div>

<!-- ==================== 游戏屏 ==================== -->
<div class="screen" id="sGame">
<div class="game-top">
  <div class="info-row">
    <span id="gInfo">第 1/20 题</span>
    <div class="timer"><span>⏱️</span><span id="timerVal">00:00</span></div>
    <span class="score-show">🏆 <span id="gScore">0</span> 分</span>
  </div>
  <div class="pg-bar"><div class="pg-fill" id="pgFill"></div></div>
  <div class="dots" id="dots"></div>
</div>
<div class="q-card" id="qCard"></div>
<div class="btn-row" id="btnRow">
  <button class="g-btn skip" id="btnSkip" onclick="skipQ()">⏭️ 跳过</button>
  <button class="g-btn submit" id="btnSub" onclick="submitA()" disabled>✅ 提交答案</button>
  <button class="g-btn next hide" id="btnNext" onclick="nextQ()">👉 下一题</button>
  <button class="g-btn finish hide" id="btnFinish" onclick="showResult()">🏁 查看成绩</button>
</div>
</div>

<!-- ==================== 结果屏 ==================== -->
<div class="screen" id="sResult">
<div class="result-box" id="resBox"></div>
</div>

<script>
/* ====== 星空 ====== */
!function(){const c=document.getElementById('stars'),x=c.getContext('2d');let w,h,p=[];function r(){w=c.width=innerWidth;h=c.height=innerHeight;p=[];for(let i=0;i<160;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,s:Math.random()*.4+.1,a:Math.random()})}r();addEventListener('resize',r);!function d(){x.clearRect(0,0,w,h);p.forEach(o=>{o.a+=o.s*.012;x.beginPath();x.arc(o.x,o.y,o.r,0,Math.PI*2);x.fillStyle=`rgba(200,220,255,${.3+Math.sin(o.a)*.3})`;x.fill();o.y-=o.s*.15;if(o.y<-5){o.y=h+5;o.x=Math.random()*w}});requestAnimationFrame(d)}()}();

/* ====== 题库（严格来自 2.1 文档内容） ====== */
const Q=[
/* ===== 单选 ×10 ===== */
{type:'s',
 text:'数据采集（数据获取）的核心目的是什么？',
 opts:['直接进行数据可视化','为后续数据分析提供数据准备','替代人工决策','清洗和转化数据'],
 ans:1,
 exp:'数据采集是指通过预设工具或程序代码，获取商品状态变化、资金状态变化、流量状态变化、用户行为和信息等数据内容的过程，为后续数据分析提供数据准备。'},

{type:'s',
 text:'以下哪项属于数据采集"四大原则"之一？',
 opts:['经济性','及时性','简便性','灵活性'],
 ans:1,
 exp:'数据采集的四大原则是：及时性、有效性、准确性、合法性。'},

{type:'s',
 text:'数据采集原则中"合法性"要求的是？',
 opts:['数据必须是最新的','数据必须完全免费','只能采集公开数据或经对方同意获取的数据','数据必须由第三方提供'],
 ans:2,
 exp:'合法性原则要求只能采集公开数据或经对方同意获取的数据，不能采用商业间谍、非法窃取等手段。'},

{type:'s',
 text:'使用火车采集器、八爪鱼采集器等爬虫工具采集数据属于哪种采集方法？',
 opts:['系统日志数据采集','数据库采集','网页数据采集','调查问卷采集'],
 ans:2,
 exp:'网页数据采集包括在电商平台上直接摘录数据，或使用火车采集器、八爪鱼采集器等爬虫工具采集。'},

{type:'s',
 text:'从网站日志中采集访客IP地址、访问时间、停留时间等数据属于哪种方法？',
 opts:['网页数据采集','系统日志数据采集','报表采集','调查问卷采集'],
 ans:1,
 exp:'系统日志数据采集是从网站日志中采集访客IP地址、访问时间、访问次数、停留时间、访客来源等数据。'},

{type:'s',
 text:'对于缺少数据指标统计功能的独立站点，最适合使用哪种采集方法？',
 opts:['数据库采集','网页数据采集','报表采集','系统日志数据采集'],
 ans:2,
 exp:'报表采集适用于缺少数据指标统计功能的独立站点，通过每日/每周工作报表（如咨询人数、接待人数、销售额等）进行数据采集。'},

{type:'s',
 text:'数据采集三个步骤中，第一步是什么？',
 opts:['建立必要的数据指标规范','数据检查','确定采集范围及人员分工','数据清洗'],
 ans:2,
 exp:'数据采集的三个步骤依次为：①确定采集范围及人员分工 → ②建立必要的数据指标规范 → ③数据检查。'},

{type:'s',
 text:'"建立必要的数据指标规范"这一步骤的核心任务是？',
 opts:['确定参与部门和人员','对数据进行唯一性标识','检查数据的完整性','确定数据来源途径'],
 ans:1,
 exp:'建立数据指标规范的核心是对数据进行唯一性标识，贯穿后续的数据查询、分析和应用。'},

{type:'s',
 text:'数据检查中"准确性检查"的主要方式是？',
 opts:['检查字段的完整性','与历史数据比较','通过平均、求和等操作与原始数据比对','保证核心指标数据完整'],
 ans:2,
 exp:'准确性检查是通过平均、求和等操作与原始数据比对，发现不匹配则检查出错误数据。'},

{type:'s',
 text:'数据采集原则中"有效性"强调的是什么？',
 opts:['数据必须准确无误','数据要在有效时间范围内','数据必须合法获取','数据要尽可能最新'],
 ans:1,
 exp:'有效性原则要求注意数值期限的有效性，确保数据在有效时间范围内。'},

/* ===== 多选 ×5 ===== */
{type:'m',
 text:'数据采集的四大原则包括哪些？（多选）',
 opts:['及时性','有效性','经济性','准确性','合法性'],
 ans:[0,1,3,4],
 exp:'数据采集的四大原则是：及时性、有效性、准确性、合法性。"经济性"不属于四大原则。'},

{type:'m',

 opts:['网页数据采集','系统日志数据采集','人工智能采集','报表采集','调查问卷采集'],

 exp:'五种采集方法为：网页数据采集、系统日志数据采集、数据库采集、报表采集、调查问卷采集。"人工智能采集"不属于。'},

{type:'m',

 opts:['数据采集的指标范围和时间范围','数据来源途径及部门','数据的可视化方式','参与部门和人员配备','数据采集目标'],
 ans:[0,1,3,4],

{type:'j',

 ans:0,

/* 关键题目提示 */
const hints={
  0:'💡 回忆数据采集的定义，关注它最终要服务于什么？',
  6:'💡 数据采集一共有三个步骤，顺序很关键！',
  10:'⚠️ 从本题开始是多选题，请选出所有正确选项！',
  15:'⚠️ 从本题开始是判断题，注意绝对化表述！'
};

/* ====== 状态 ====== */
let pName='',pId='',cur=0,score=0,sC=0,mC=0,jC=0,combo=0,maxCombo=0,sel=[],answered=false,results=[];
let timerSec=0,timerInt=null;

/* ====== 工具函数 ====== */
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startTimer(){timerSec=0;clearInterval(timerInt);timerInt=setInterval(()=>{timerSec++;const m=String(Math.floor(timerSec/60)).padStart(2,'0'),s=String(timerSec%60).padStart(2,'0');document.getElementById('timerVal').textContent=m+':'+s},1000)}
function stopTimer(){clearInterval(timerInt)}
function fmtTime(s){const m=Math.floor(s/60);return m>0?m+'分'+(s%60)+'秒':(s%60)+'秒'}
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0)}

/* ====== 开始 ====== */
function startGame(){
  pId=document.getElementById('iId').value.trim();
  pName=document.getElementById('iName').value.trim();
  if(!pId||!pName){alert('请输入学号和姓名！');return}
  cur=0;score=0;sC=0;mC=0;jC=0;combo=0;maxCombo=0;sel=[];answered=false;results=[];
  const sQ=shuffle(Q.filter(q=>q.type==='s'));
  const mQ=shuffle(Q.filter(q=>q.type==='m'));
  const jQ=shuffle(Q.filter(q=>q.type==='j'));
  Q.length=0;Q.push(...sQ,...mQ,...jQ);
  buildDots();renderQ();startTimer();showScr('sGame');
}

/* ====== 圆点 ====== */
function buildDots(){const d=document.getElementById('dots');d.innerHTML='';for(let i=0;i<Q.length;i++){const s=document.createElement('span');s.className='dot';s.id='dot'+i;s.textContent=i+1;d.appendChild(s)}updDot()}
function updDot(){Q.forEach((_,i)=>{const d=document.getElementById('dot'+i);if(!d)return;d.classList.remove('cur');if(i===cur)d.classList.add('cur')})}
function updPg(){document.getElementById('pgFill').style.width=((cur+1)/Q.length*100)+'%';document.getElementById('gInfo').textContent=`第 ${cur+1}/${Q.length} 题`;document.getElementById('gScore').textContent=score}

/* ====== 按钮状态 ====== */
function updateBtns(state){
  const sub=document.getElementById('btnSub'),nxt=document.getElementById('btnNext'),skp=document.getElementById('btnSkip'),fin=document.getElementById('btnFinish');
  sub.classList.add('hide');nxt.classList.add('hide');skp.classList.add('hide');fin.classList.add('hide');
  if(state==='answering'){sub.classList.remove('hide');sub.disabled=sel.length===0;skp.classList.remove('hide')}
  else if(state==='answered'){nxt.classList.remove('hide')}
  else if(state==='last_answered'){fin.classList.remove('hide')}
}

/* ====== 渲染题目 ====== */
function renderQ(){
  answered=false;sel=[];
  const q=Q[cur];
  const tm={s:['📘 单选题','s'],m:['📗 多选题（可多选）','m'],j:['📙 判断题','j']};
  const [tL,tC]=tm[q.type];
  const pts=q.type==='m'?10:5;
  const letters='ABCDEFGH';
  let h=`<span class="q-type ${tC}">${tL}</span>`;
  h+=`<div class="q-num">第 ${cur+1} / ${Q.length} 题 · ${pts}分</div>`;
  h+=`<div class="q-text">${q.text}</div>`;
  if(hints[cur])h+=`<div class="q-note">${hints[cur]}</div>`;
  if(q.type==='m')h+=`<div class="q-note">💡 本题为多选题，请选择所有正确选项后提交</div>`;
  h+=`<div class="opts" id="optsBox">`;
  q.opts.forEach((o,i)=>{h+=`<div class="opt" data-i="${i}" onclick="selOpt(this,${i})"><span class="olet">${q.type==='j'?['⭕','❌'][i]:letters[i]}</span><span class="otxt">${o}</span></div>`});
  h+=`</div><div class="exp-box" id="expBox"></div>`;
  document.getElementById('qCard').innerHTML=h;
  updateBtns('answering');updDot();updPg();
}

/* ====== 选择 ====== */
function selOpt(el,i){
  if(answered)return;
  const q=Q[cur];
  if(q.type==='m'){if(sel.includes(i)){sel=sel.filter(x=>x!==i);el.classList.remove('sel')}else{sel.push(i);el.classList.add('sel')}}
  else{document.querySelectorAll('#optsBox .opt').forEach(o=>o.classList.remove('sel'));sel=[i];el.classList.add('sel')}
  document.getElementById('btnSub').disabled=sel.length===0;
}

/* ====== 跳过 ====== */
function skipQ(){
  if(answered)return;answered=true;combo=0;
  const q=Q[cur];results.push({q:q.text,type:q.type,ok:false,skipped:true,exp:q.exp});
  const opts=document.querySelectorAll('#optsBox .opt');
  opts.forEach(o=>{o.classList.add('disabled');const idx=+o.dataset.i;if(q.type==='m'){if(q.ans.includes(idx))o.classList.add('hi')}else{if(idx===q.ans)o.classList.add('hi')}});
  const eb=document.getElementById('expBox');eb.className='exp-box show no';eb.innerHTML='⏭️ 已跳过本题<br>'+q.exp;
  const dot=document.getElementById('dot'+cur);dot.classList.remove('cur');dot.classList.add('skip');
  updateBtns(cur>=Q.length-1?'last_answered':'answered');
}

/* ====== 提交 ====== */
function submitA(){
  if(answered||sel.length===0)return;answered=true;
  const q=Q[cur];let ok=false;
  if(q.type==='m'){const s=[...sel].sort(),a=[...q.ans].sort();ok=s.length===a.length&&s.every((v,i)=>v===a[i])}else{ok=sel[0]===q.ans}
  let pts=0;
  if(ok){pts=q.type==='m'?10:5;score+=pts;combo++;if(combo>maxCombo)maxCombo=combo;if(combo>=3)showCombo(combo);if(q.type==='s')sC++;else if(q.type==='m')mC++;else jC++;spawnP(['⭐','✨','🎉','🌟']);showScoreFly('+'+pts)}else{combo=0}
  results.push({q:q.text,type:q.type,ok,skipped:false,exp:q.exp});
  const opts=document.querySelectorAll('#optsBox .opt');
  opts.forEach(o=>{o.classList.add('disabled');const idx=+o.dataset.i;if(q.type==='m'){if(q.ans.includes(idx))o.classList.add(sel.includes(idx)?'ok':'hi');else if(sel.includes(idx))o.classList.add('no')}else{if(idx===q.ans)o.classList.add('ok');else if(sel.includes(idx))o.classList.add('no')}});
  const eb=document.getElementById('expBox');eb.className='exp-box show '+(ok?'ok':'no');eb.innerHTML=(ok?'✅ 回答正确！ +'+pts+'分':'❌ 回答错误！')+'<br>'+q.exp;
  const dot=document.getElementById('dot'+cur);dot.classList.remove('cur');dot.classList.add(ok?'ok':'no');
  document.getElementById('gScore').textContent=score;
  updateBtns(cur>=Q.length-1?'last_answered':'answered');
}

/* ====== 下一题 ====== */
function nextQ(){cur++;if(cur>=Q.length){showResult();return}renderQ()}

/* ====== 结果 ====== */
function showResult(){
  stopTimer();
  const total=Q.length,correct=results.filter(r=>r.ok).length,skipped=results.filter(r=>r.skipped).length,wrong=total-correct-skipped;
  const pct=Math.round(correct/total*100);
  const starCnt=pct>=90?5:pct>=75?4:pct>=60?3:pct>=40?2:1;
  const starStr='⭐'.repeat(starCnt)+'☆'.repeat(5-starCnt);
  let emoji,title,sub;
  if(pct>=90){emoji='🏆';title='数据采集大师！';sub='你对数据采集认知掌握得非常扎实！'}
  else if(pct>=70){emoji='🌟';title='表现不错！继续加油！';sub='大部分知识点已掌握，再巩固一下薄弱环节！'}
  else if(pct>=50){emoji='💪';title='还需努力！别灰心！';sub='建议重点复习四大原则和五种方法！'}
  else{emoji='📖';title='要加油了！回去复习一下吧！';sub='建议重新学习本单元内容，掌握基础后再来挑战！'}
  let h=`<div class="r-emoji">${emoji}</div>`;
  h+=`<div class="r-title">${title}</div>`;
  h+=`<div class="r-sub">${pName}同学，${sub}</div>`;
  h+=`<div class="r-score">${score}</div>`;
  h+=`<div class="r-stars">${starStr}</div>`;
  h+=`<div class="r-total">满分 100 分 · 正确率 ${pct}% · 用时 ${fmtTime(timerSec)}</div>`;
  h+=`<div class="r-stats">
    <div class="r-stat"><div class="v" style="color:var(--green)">${correct}</div><div class="l">答对</div></div>
    <div class="r-stat"><div class="v" style="color:var(--red)">${wrong}</div><div class="l">答错</div></div>
    <div class="r-stat"><div class="v" style="color:var(--orange)">${skipped}</div><div class="l">跳过</div></div>
    <div class="r-stat"><div class="v" style="color:var(--gold)">${maxCombo}</div><div class="l">最长连击</div></div>
  </div>`;
  h+=`<div class="r-stats" style="margin-bottom:20px">
    <div class="r-stat"><div class="v" style="color:var(--blue)">${sC}/10</div><div class="l">单选题</div></div>
    <div class="r-stat"><div class="v" style="color:var(--purple)">${mC}/5</div><div class="l">多选题</div></div>
    <div class="r-stat"><div class="v" style="color:var(--pink)">${jC}/5</div><div class="l">判断题</div></div>
  </div>`;
  h+=`<div class="r-detail">`;
  results.forEach((r,i)=>{const ico=r.skipped?'⏭️':r.ok?'✅':'❌';h+=`<div class="r-d-item"><span class="ico">${ico}</span><div class="dtxt"><b>第${i+1}题：</b>${r.q}<div class="dexp">${r.exp}</div></div></div>`});
  h+=`</div>`;
  h+=`<div class="r-btn-row"><button class="home-btn" onclick="showScr('sLogin')">🏠 返回首页</button><button class="retry-btn" onclick="showScr('sLogin')">🔄 再来一次</button></div>`;
  document.getElementById('resBox').innerHTML=h;
  showScr('sResult');
  spawnP(['🎊','⭐','🏆','✨','🎉','💫','🌟'],28);
}

/* ====== 特效 ====== */
function showCombo(n){const t=document.getElementById('comboT');const m={3:'🔥 三连正确！',4:'🔥 四连！超厉害！',5:'🔥 五连！无敌！'};t.textContent=n<=5?(m[n]||`🔥×${n} 连续正确！`):`🔥×${n} 连续正确！传奇！`;t.style.display='block';t.style.animation='none';requestAnimationFrame(()=>{t.style.animation='cIn 2.2s ease forwards'});setTimeout(()=>t.style.display='none',2300)}
function showScoreFly(txt){const el=document.createElement('div');el.className='score-fly';el.textContent=txt;el.style.left=Math.random()*30+35+'%';el.style.top='40%';document.body.appendChild(el);setTimeout(()=>el.remove(),1300)}
function spawnP(e,n=12){for(let i=0;i<n;i++)setTimeout(()=>{const p=document.createElement('div');p.className='ptc';p.textContent=e[Math.floor(Math.random()*e.length)];p.style.left=Math.random()*100+'vw';p.style.top=Math.random()*60+20+'vh';p.style.animationDuration=(1.5+Math.random())+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),2500)},i*80)}

/* ====== 键盘 ====== */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('sLogin').classList.contains('active'))startGame();
    else if(document.getElementById('sGame').classList.contains('active')){if(!answered&&sel.length>0)submitA();else if(answered){if(cur>=Q.length-1)showResult();else nextQ()}}
  }
  if(document.getElementById('sGame').classList.contains('active')&&!answered){const n=parseInt(e.key);if(n>=1&&n<=Q[cur].opts.length){const o=document.querySelectorAll('#optsBox .opt');if(o[n-1])selOpt(o[n-1],n-1)}}
});
</script>
