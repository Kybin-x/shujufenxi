<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模块二·单元一 数据采集认知 · 闯关挑战</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080B1A;--bg2:#0D1130;
  --surface:rgba(255,255,255,.055);--border:rgba(255,255,255,.11);
  --gold:#FFD700;--gold2:#FFA500;
  --teal:#00E5CC;--pink:#FF6B9D;--purple:#C77DFF;
  --blue:#74B9FF;--green:#00E676;--red:#FF5252;
  --cyan:#00D4FF;--orange:#FF9500;
  --text:#F0F0FF;--muted:rgba(240,240,255,.52);
  --r:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
canvas.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}

.screen{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;}
.screen.active{display:flex;}

/* LOGIN */
.login-box{background:linear-gradient(135deg,rgba(13,17,48,.97),rgba(8,11,26,.98));border:1.5px solid var(--border);border-radius:28px;padding:48px 40px;max-width:480px;width:100%;box-shadow:0 0 80px rgba(0,229,204,.1),0 30px 60px rgba(0,0,0,.55);text-align:center;animation:up .8s ease both;}
@keyframes up{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
.game-logo{width:88px;height:88px;margin:0 auto 18px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#0D9488);display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 0 36px rgba(0,229,204,.4);animation:glow 3s ease-in-out infinite alternate;}
@keyframes glow{from{box-shadow:0 0 20px rgba(0,229,204,.25);}to{box-shadow:0 0 55px rgba(0,229,204,.65);}}
.ltitle{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(20px,4vw,28px);background:linear-gradient(90deg,var(--teal),var(--blue),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.lsub{color:var(--muted);font-size:13px;margin-bottom:6px;}
.lmod{color:var(--teal);font-size:12px;margin-bottom:22px;opacity:.8;}
.badge-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
.bdg{padding:5px 13px;border-radius:18px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;}
.bdg.s{background:rgba(116,185,255,.14);color:var(--blue);border:1px solid rgba(116,185,255,.28);}
.bdg.m{background:rgba(0,229,204,.14);color:var(--teal);border:1px solid rgba(0,229,204,.28);}
.bdg.j{background:rgba(255,107,157,.14);color:var(--pink);border:1px solid rgba(255,107,157,.28);}
.inp-g{margin-bottom:15px;text-align:left;}
.inp-g label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px;font-weight:700;}
.inp-g input{width:100%;padding:13px 17px;background:rgba(255,255,255,.07);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-size:15px;font-family:'Noto Sans SC',sans-serif;outline:none;transition:border-color .3s,box-shadow .3s;}
.inp-g input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,229,204,.13);}
.inp-g input::placeholder{color:rgba(240,240,255,.2);}
.start-btn{width:100%;padding:15px;margin-top:6px;background:linear-gradient(135deg,var(--teal),#0D9488);color:#001A14;font-weight:900;font-size:17px;font-family:'ZCOOL KuaiLe',cursive;border:none;border-radius:15px;cursor:pointer;letter-spacing:2px;box-shadow:0 8px 28px rgba(0,229,204,.3);transition:all .3s;position:relative;overflow:hidden;}
.start-btn::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.28);transform:skewX(-20deg);transition:left .5s;}
.start-btn:hover::after{left:120%;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(0,229,204,.42);}

/* GAME */
.game-wrap{width:100%;max-width:760px;animation:up .5s ease both;}
.g-header{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:17px;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;backdrop-filter:blur(10px);flex-wrap:wrap;gap:10px;}
.pinfo{display:flex;align-items:center;gap:10px;}
.pavt{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#0D9488);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0;}
.pname{font-weight:700;font-size:14px;}
.pid{font-size:12px;color:var(--muted);}
.sc-disp{display:flex;align-items:center;gap:6px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.28);border-radius:11px;padding:7px 14px;}
.sc-val{font-family:'ZCOOL KuaiLe',cursive;font-size:20px;color:var(--gold);}
.sc-tot{font-size:12px;color:var(--muted);}

/* progress */
.pg-wrap{margin-bottom:16px;}
.pg-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:7px;}
.pg-track{background:rgba(255,255,255,.08);border-radius:9px;height:9px;overflow:hidden;}
.pg-fill{height:100%;border-radius:9px;background:linear-gradient(90deg,var(--teal),var(--blue),var(--gold));transition:width .6s cubic-bezier(.4,0,.2,1);}

/* stage dots */
.sdots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.sdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid rgba(255,255,255,.18);color:var(--muted);transition:all .4s;}
.sdot.done{background:var(--green);border-color:var(--green);color:#003;}
.sdot.wdot{background:var(--red);border-color:var(--red);color:#fff;}
.sdot.cur{border-color:var(--gold);color:var(--gold);animation:pc 1s ease-in-out infinite alternate;}
@keyframes pc{from{box-shadow:0 0 7px rgba(255,215,0,.25);}to{box-shadow:0 0 20px rgba(255,215,0,.65);}}

/* question card */
.qcard{background:linear-gradient(135deg,rgba(13,17,48,.92),rgba(8,11,26,.96));border:1.5px solid var(--border);border-radius:22px;padding:28px;box-shadow:0 20px 56px rgba(0,0,0,.42);animation:sc .4s cubic-bezier(.4,0,.2,1) both;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle,rgba(0,229,204,.06) 0%,transparent 70%);pointer-events:none;}
@keyframes sc{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
.qtype-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 13px;border-radius:18px;font-size:12px;font-weight:700;margin-bottom:14px;}
.qtype-badge.s{background:rgba(116,185,255,.14);color:var(--blue);border:1px solid rgba(116,185,255,.27);}
.qtype-badge.m{background:rgba(0,229,204,.14);color:var(--teal);border:1px solid rgba(0,229,204,.27);}
.qtype-badge.j{background:rgba(255,107,157,.14);color:var(--pink);border:1px solid rgba(255,107,157,.27);}
.qtxt{font-size:clamp(14px,2.4vw,17px);line-height:1.8;font-weight:700;margin-bottom:18px;}
.qhint{font-size:12px;color:var(--teal);margin-bottom:13px;display:flex;align-items:center;gap:5px;}
.qnote{background:rgba(255,255,255,.05);border-left:3px solid var(--teal);border-radius:9px;padding:9px 13px;font-size:12px;color:#A5F3FC;margin-bottom:14px;line-height:1.75;}

/* options */
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.09);border-radius:14px;cursor:pointer;transition:all .25s;user-select:none;position:relative;overflow:hidden;}
.opt:hover:not(.locked){border-color:rgba(255,255,255,.27);background:rgba(255,255,255,.07);transform:translateX(4px);}
.opt.sel:not(.locked){border-color:var(--purple);background:rgba(199,125,255,.11);}
.opt.correct{border-color:var(--green)!important;background:rgba(0,230,118,.09)!important;animation:cflash .5s;}
@keyframes cflash{0%,100%{background:rgba(0,230,118,.09);}50%{background:rgba(0,230,118,.22);}}
.opt.wrong{border-color:var(--red)!important;background:rgba(255,82,82,.09)!important;animation:wshake .4s;}
@keyframes wshake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.opt.locked{cursor:not-allowed;}
.opt.show-c{border-color:var(--green)!important;background:rgba(0,230,118,.05)!important;}
.okey{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.09);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;transition:all .25s;}
.opt.sel:not(.locked) .okey{background:var(--purple);color:#fff;}
.opt.correct .okey{background:var(--green);color:#003;}
.opt.wrong .okey{background:var(--red);color:#fff;}
.opt.show-c .okey{background:var(--green);color:#003;}
.otxt{font-size:13px;line-height:1.6;padding-top:4px;}

/* buttons */
.sub-btn{width:100%;margin-top:18px;padding:13px;background:linear-gradient(135deg,var(--teal),#0D9488);color:#003;font-weight:900;font-size:15px;font-family:'ZCOOL KuaiLe',cursive;border:none;border-radius:14px;cursor:pointer;letter-spacing:1px;box-shadow:0 5px 22px rgba(0,229,204,.28);transition:all .3s;position:relative;overflow:hidden;}
.sub-btn::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.28);transform:skewX(-20deg);transition:left .5s;}
.sub-btn:hover:not(:disabled)::after{left:120%;}
.sub-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 9px 30px rgba(0,229,204,.38);}
.sub-btn:disabled{opacity:.35;cursor:not-allowed;background:rgba(255,255,255,.09);color:var(--muted);box-shadow:none;transform:none;}
.next-btn{width:100%;margin-top:11px;padding:13px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-weight:900;font-size:15px;font-family:'ZCOOL KuaiLe',cursive;border:none;border-radius:14px;cursor:pointer;letter-spacing:1px;box-shadow:0 5px 22px rgba(199,125,255,.3);transition:all .3s;display:none;}
.next-btn.show{display:block;animation:up .3s ease;}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 9px 30px rgba(199,125,255,.42);}

/* feedback */
.fb{display:none;margin-top:15px;padding:15px 17px;border-radius:13px;font-size:13px;line-height:1.75;}
.fb.show{display:block;animation:up .4s;}
.fb.cfb{background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.28);}
.fb.wfb{background:rgba(255,82,82,.07);border:1px solid rgba(255,82,82,.28);}
.fb-hd{display:flex;align-items:center;gap:8px;font-weight:900;font-size:15px;margin-bottom:7px;}
.fb-hd.ok{color:var(--green);}
.fb-hd.no{color:var(--red);}
.fb-ans{font-size:12px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.07);display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.ak{padding:2px 10px;border-radius:7px;background:rgba(255,215,0,.14);color:var(--gold);font-size:11px;font-weight:700;border:1px solid rgba(255,215,0,.28);}

/* RESULT */
.res-wrap{max-width:620px;width:100%;text-align:center;animation:up .7s ease both;}
.res-fw{font-size:46px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:20px;animation:bounce .8s ease;}
@keyframes bounce{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
.res-card{background:linear-gradient(135deg,rgba(13,17,48,.98),rgba(8,11,26,.99));border:1.5px solid var(--border);border-radius:26px;padding:40px 36px;box-shadow:0 0 80px rgba(0,229,204,.07),0 40px 80px rgba(0,0,0,.55);position:relative;overflow:hidden;}
.res-card::before{content:'';position:absolute;top:-70px;right:-70px;width:240px;height:240px;background:radial-gradient(circle,rgba(0,229,204,.05) 0%,transparent 70%);pointer-events:none;}
.res-icon{width:94px;height:94px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:44px;}
.res-grade{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(20px,4vw,27px);color:var(--gold);margin-bottom:6px;}
.res-nm{font-size:16px;margin-bottom:5px;}
.res-ach{font-size:clamp(12px,2vw,14px);color:var(--muted);line-height:1.75;margin:13px 0 20px;padding:13px;background:rgba(255,255,255,.04);border-radius:12px;border:1px solid var(--border);}
.sb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0 24px;}
.sb-item{background:rgba(255,255,255,.05);border-radius:12px;padding:13px 8px;border:1px solid var(--border);}
.sb-icon{font-size:19px;margin-bottom:5px;}
.sb-type{font-size:11px;color:var(--muted);margin-bottom:3px;}
.sb-n{font-family:'ZCOOL KuaiLe',cursive;font-size:19px;color:var(--teal);}
.sb-t{font-size:10px;color:var(--muted);}
.big-sc{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(46px,8vw,68px);background:linear-gradient(90deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px;}
.sc-lbl{font-size:13px;color:var(--muted);margin-bottom:24px;}
.retry-btn{display:inline-flex;align-items:center;gap:9px;padding:14px 36px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1A1200;font-weight:900;font-size:16px;font-family:'ZCOOL KuaiLe',cursive;border:none;border-radius:18px;cursor:pointer;letter-spacing:2px;box-shadow:0 8px 28px rgba(255,215,0,.32);transition:all .3s;}
.retry-btn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 38px rgba(255,215,0,.46);}

/* particles & combo */
.ptc{position:fixed;pointer-events:none;z-index:999;font-size:22px;animation:ptcfly 2s ease-out forwards;}
@keyframes ptcfly{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-200px) scale(0);opacity:0;}}
.combo-t{position:fixed;top:18px;right:18px;z-index:999;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1A1200;font-weight:900;font-size:14px;font-family:'ZCOOL KuaiLe',cursive;padding:10px 18px;border-radius:12px;box-shadow:0 8px 28px rgba(255,215,0,.45);animation:cIn 2.2s ease forwards;display:none;}
@keyframes cIn{0%{opacity:0;transform:translateX(50px);}15%,75%{opacity:1;transform:translateX(0);}100%{opacity:0;transform:translateX(50px);}}

@media(max-width:500px){.login-box{padding:30px 18px;}.qcard{padding:18px 14px;}.res-card{padding:28px 18px;}.g-header{padding:10px 13px;}}
</style>
</head>
<body>
<canvas class="stars" id="stars"></canvas>
<div class="combo-t" id="comboT"></div>

<!-- LOGIN -->
<div class="screen active" id="sLogin">
  <div class="login-box">
    <div class="game-logo">📥</div>
    <div class="ltitle">数据采集认知 · 闯关</div>
    <div class="lsub">模块二 · 单元一</div>
    <div class="lmod">概念 · 原则 · 方法 · 步骤</div>
    <div class="badge-row">
      <span class="bdg s">🔵 单选 ×10</span>
      <span class="bdg m">🟢 多选 ×5</span>
      <span class="bdg j">🩷 判断 ×5</span>
    </div>
    <div class="inp-g"><label>📋 学号</label><input type="text" id="iId" placeholder="请输入学号" maxlength="20"></div>
    <div class="inp-g"><label>✏️ 姓名</label><input type="text" id="iName" placeholder="请输入姓名" maxlength="12"></div>
    <button class="start-btn" onclick="startGame()">⚡ 开始闯关</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="sGame">
  <div class="game-wrap">
    <div class="g-header">
      <div class="pinfo">
        <div class="pavt" id="avt">A</div>
        <div><div class="pname" id="hName">-</div><div class="pid" id="hId">-</div></div>
      </div>
      <div class="sc-disp">
        <span style="font-size:18px;">⭐</span>
        <div class="sc-val" id="scV">0</div>
        <div class="sc-tot">/20题</div>
      </div>
    </div>
    <div class="pg-wrap">
      <div class="pg-meta"><span id="pgTxt">第1题/共20题</span><span id="pgPct">0%</span></div>
      <div class="pg-track"><div class="pg-fill" id="pgFill" style="width:0%"></div></div>
    </div>
    <div class="sdots" id="sdots"></div>
    <div class="qcard" id="qcard"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="sResult">
  <div class="res-wrap">
    <div class="res-fw" id="rFw">🎉🏆🎊</div>
    <div class="res-card">
      <div class="res-icon" id="rIcon" style="background:linear-gradient(135deg,#FFD700,#FFA500)">🏆</div>
      <div class="res-grade" id="rGrade">闯关完成！</div>
      <div class="res-nm" id="rNm"></div>
      <div class="res-ach" id="rAch"></div>
      <div class="big-sc" id="bigSc">0</div>
      <div class="sc-lbl">综合得分（满分 20 分）</div>
      <div class="sb-grid">
        <div class="sb-item"><div class="sb-icon">🔵</div><div class="sb-type">单选题</div><div class="sb-n" id="sb1">0</div><div class="sb-t">/10</div></div>
        <div class="sb-item"><div class="sb-icon">🟢</div><div class="sb-type">多选题</div><div class="sb-n" id="sb2">0</div><div class="sb-t">/5</div></div>
        <div class="sb-item"><div class="sb-icon">🩷</div><div class="sb-type">判断题</div><div class="sb-n" id="sb3">0</div><div class="sb-t">/5</div></div>
      </div>
      <button class="retry-btn" onclick="retry()">🔄 再战一次</button>
    </div>
  </div>
</div>

<script>
/* ── STARS ── */
(()=>{
  const c=document.getElementById('stars'),x=c.getContext('2d');let s=[];
  const r=()=>{c.width=innerWidth;c.height=innerHeight;s=[];for(let i=0;i<160;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.3,a:Math.random(),sp:Math.random()*.35+.1});};
  const d=()=>{x.clearRect(0,0,c.width,c.height);s.forEach(p=>{x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=`rgba(255,255,255,${p.a})`;x.fill();p.a+=p.sp*.01;if(p.a>1)p.sp=-Math.abs(p.sp);if(p.a<.1)p.sp=Math.abs(p.sp);});requestAnimationFrame(d);};
  window.addEventListener('resize',r);r();d();
})();

/* ── QUESTION BANK ── */
const Q=[
/* ======== 单选 10 ======== */
{type:'single',
 text:'数据采集的另一个名称是什么？',
 opts:['A. 数据处理','B. 数据获取','C. 数据分析','D. 数据存储'],
 ans:[1],
 exp:'数据采集也称为「数据获取」，是指通过在平台源程序中预设工具或程序代码，采集商品状态、资金状态、流量状态及用户行为等数据的过程。'
},
{type:'single',
 text:'数据采集的根本目的是什么？',
 opts:['A. 提高销售额','B. 为后续进行数据分析提供数据准备','C. 监控员工工作状态','D. 生成财务报表'],
 ans:[1],
 exp:'数据采集的目的是为后续进行数据分析提供数据准备。没有充分的数据采集，后续的分析、展现和报告都将无从谈起。'
},
{type:'single',
 text:'「及时性」原则的核心要求是？',
 opts:['A. 只采集付费数据，确保准确','B. 尽可能获取平台最新数据，与往期数据比对，发现问题并预测变化趋势','C. 确保数据在有效范围内，排除过期数据','D. 确保采集数据时不违反任何法律法规'],
 ans:[1],
 exp:'及时性原则要求尽可能获取平台最新数据，与往期数据比对，从而发现问题并预测变化趋势。过时的数据不能反映当前情况，失去分析价值。'
},
{type:'single',
 text:'以下哪种行为违反了数据采集的「合法性」原则？',
 opts:['A. 通过问卷调查收集用户反馈','B. 使用生意参谋查看行业销售趋势','C. 雇佣人员非法入侵竞争对手数据库窃取数据','D. 从公开渠道下载政府统计报告'],
 ans:[2],

/* ── STATE ── */
let pName='',pId='',cur=0,score=0,sC=0,mC=0,jC=0,combo=0;
const sel=new Set();

function startGame(){
  pId=document.getElementById('iId').value.trim();
  pName=document.getElementById('iName').value.trim();
  if(!pId){alert('请输入学号！');return;}
  if(!pName){alert('请输入姓名！');return;}
  cur=0;score=0;sC=0;mC=0;jC=0;combo=0;
  document.getElementById('hName').textContent=pName;
  document.getElementById('hId').textContent='学号: '+pId;
  document.getElementById('avt').textContent=pName[0];
  document.getElementById('scV').textContent='0';
  buildDots();showScr('sGame');renderQ();
}

function buildDots(){
  const row=document.getElementById('sdots');row.innerHTML='';
  Q.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='sdot'+(i===0?' cur':'');
    d.id='d'+i;d.textContent=i+1;
    row.appendChild(d);
  });
}

function updDot(i,res){
  const d=document.getElementById('d'+i);if(!d)return;
  d.classList.remove('cur');
  d.classList.add(res==='ok'?'done':'wdot');
  d.textContent=res==='ok'?'✓':'✗';
  const n=document.getElementById('d'+(i+1));
  if(n)n.classList.add('cur');
}

function updPg(){
  const p=Math.round((cur/Q.length)*100);
  document.getElementById('pgFill').style.width=p+'%';
  document.getElementById('pgTxt').textContent=`第 ${cur+1} 题 / 共 ${Q.length} 题`;
  document.getElementById('pgPct').textContent=p+'%';
}

function renderQ(){
  updPg();sel.clear();
  const q=Q[cur],card=document.getElementById('qcard');
  const tc=q.type,isM=tc==='multi';
  const tLabel=tc==='single'?'🔵 单选题':tc==='multi'?'🟢 多选题':'🩷 判断题';
  const tCls=tc==='single'?'s':tc==='multi'?'m':'j';

  // topic hint for key questions
  const hints={
    0:'<div class="qnote">📌 本题考查：数据采集的基本概念</div>',
    2:'<div class="qnote">📌 四大原则：及时性 · 有效性 · 准确性 · 合法性</div>',
    4:'<div class="qnote">📌 网页采集工具：火车采集器、八爪鱼采集器；平台工具：生意参谋、京东商智</div>',
    7:'<div class="qnote">📌 三步流程：①确定范围 → ②建立规范 → ③数据检查</div>',
    10:'<div class="qnote">📌 四类采集内容：商品状态 / 资金状态 / 流量状态 / 用户行为和信息</div>',
    14:'<div class="qnote">📌 三种检查：完整性检查 / 准确性检查 / 规范性检查</div>',
  };
  const hint=hints[cur]||'';

  const optsHtml=q.opts.map((o,i)=>`
    <div class="opt" id="o${i}" onclick="selOpt(${i})">
      <div class="okey">${['A','B','C','D','E'][i]}</div>
      <div class="otxt">${o.replace(/^[A-E]\.\s*/,'')}</div>
    </div>`).join('');

  card.innerHTML=`
    <div class="qtype-badge ${tCls}">${tLabel} · 第 ${cur+1} 题</div>
    <div class="qtxt">${q.text}</div>
    ${hint}
    ${isM?'<div class="qhint">💡 多选题——请选出所有正确答案后再提交</div>':''}
    <div class="opts" id="owrap">${optsHtml}</div>
    <button class="sub-btn" id="sbtn" onclick="submitA()" disabled>确认提交</button>
    <div class="fb" id="fbBox"></div>
    <button class="next-btn" id="nbtn" onclick="nextQ()">
      ${cur+1<Q.length?'继续下一题 →':'查看最终成绩 🏆'}
    </button>`;
  card.style.animation='none';
  requestAnimationFrame(()=>{card.style.animation='sc .4s cubic-bezier(.4,0,.2,1) both';});
}

function selOpt(i){
  const q=Q[cur];
  if(document.getElementById('o'+i).classList.contains('locked'))return;
  if(q.type==='single'||q.type==='judge'){
    sel.clear();
    q.opts.forEach((_,j)=>document.getElementById('o'+j).classList.remove('sel'));
    sel.add(i);document.getElementById('o'+i).classList.add('sel');
  } else {
    const el=document.getElementById('o'+i);
    if(sel.has(i)){sel.delete(i);el.classList.remove('sel');}
    else{sel.add(i);el.classList.add('sel');}
  }
  document.getElementById('sbtn').disabled=(sel.size===0);
}

function submitA(){
  const q=Q[cur];
  const chosen=[...sel].sort(),correct=[...q.ans].sort();
  const ok=JSON.stringify(chosen)===JSON.stringify(correct);

  q.opts.forEach((_,i)=>{
    const el=document.getElementById('o'+i);
    el.classList.add('locked');el.onclick=null;
  });
  q.ans.forEach(i=>document.getElementById('o'+i).classList.add('show-c'));
  chosen.forEach(i=>{
    const el=document.getElementById('o'+i);
    if(q.ans.includes(i)){el.classList.add('correct');el.classList.remove('show-c');}
    else el.classList.add('wrong');
  });

  if(ok){
    score++;combo++;
    if(q.type==='single')sC++;else if(q.type==='multi')mC++;else jC++;
    document.getElementById('scV').textContent=score;
    updDot(cur,'ok');
    spawnP(['⭐','✨','🎉','💫']);
    if(combo>=3)showCombo(combo);
  } else {combo=0;updDot(cur,'no');}

  const fb=document.getElementById('fbBox');
  fb.innerHTML=`<div class="fb-hd ${ok?'ok':'no'}">${ok?'🎯 回答正确！+1分':'💔 回答错误'}</div>${q.exp}<div class="fb-ans"><span style="color:var(--gold);font-weight:700;">正确答案：</span>${q.ans.map(i=>`<span class="ak">${['A','B','C','D','E'][i]}</span>`).join(' ')}</div>`;
  fb.className='fb show '+(ok?'cfb':'wfb');
  document.getElementById('sbtn').style.display='none';
  document.getElementById('nbtn').classList.add('show');
  sel.clear();
}

function nextQ(){
  cur++;
  if(cur>=Q.length)showResult();
  else{renderQ();updPg();}
}

function showResult(){
  showScr('sResult');
  const pct=Math.round((score/Q.length)*100);
  document.getElementById('bigSc').textContent=score;
  document.getElementById('sb1').textContent=sC;
  document.getElementById('sb2').textContent=mC;
  document.getElementById('sb3').textContent=jC;
  document.getElementById('rNm').textContent=`同学：${pName}（学号：${pId}）`;

  let em,grade,ach,bg;
  if(pct>=95){
    em='🏆🌟🥇';grade='采集王者';
    ach=`太厉害了！${pName}同学，以近满分的成绩征服了「数据采集认知」全部内容！无论是概念、四大原则、五种采集方法还是三步流程，你已全面掌握。专业数据分析师的路已经铺好了！🎊`;
    bg='linear-gradient(135deg,#FFD700,#FFA500)';
  } else if(pct>=80){
    em='🥈⭐✨';grade='数据精英';
    ach=`很棒！${pName}同学，得分${score}/20，对数据采集的概念、原则、方法掌握得相当扎实。把错题再复习一遍，满分就在眼前！`;
    bg='linear-gradient(135deg,#00D4FF,#7C3AED)';
  } else if(pct>=60){
    ach=`加油，${pName}同学！得分${score}/20，基础知识已掌握。建议重点复习：四大采集原则（尤其合法性）、五种采集方法的适用场景、三步流程的顺序，再来挑战一次！`;
    em='🥉📚💡';grade='进步之星';
    bg='linear-gradient(135deg,#00E5CC,#0D9488)';
  } else {
    ach=`勇气可嘉，${pName}同学！得分${score}/20，本节内容还需要加强。重点回顾：数据采集的概念和四大原则、各种采集方法的区别与适用场景、三步数据检查的内容，相信你下次一定大有进步！`;
    em='📖🔁💪';grade='勇于挑战者';
    bg='linear-gradient(135deg,#FF6B9D,#C026D3)';
  }

  document.getElementById('rIcon').style.background=bg;
  document.getElementById('rIcon').textContent=em.split('')[0];
  document.getElementById('rGrade').textContent=grade+' · 闯关完成！';
  document.getElementById('rAch').textContent=ach;
  document.getElementById('rFw').textContent=em;
  setTimeout(()=>spawnP(['🎉','⭐','🏆','✨','🎊','💫','🌟'],28),300);
}

function showScr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function retry(){showScr('sLogin');document.getElementById('iName').value='';document.getElementById('iId').value='';}

function spawnP(emojis,n=12){
  for(let i=0;i<n;i++)setTimeout(()=>{
    const p=document.createElement('div');p.className='ptc';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left=Math.random()*100+'vw';p.style.top=Math.random()*60+20+'vh';
    p.style.animationDuration=(1.5+Math.random())+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),2500);
  },i*80);
}

function showCombo(n){
  const t=document.getElementById('comboT');
  const msgs={3:'🔥 三连正确！',4:'🔥🔥 四连！超厉害！',5:'🔥🔥🔥 五连！无敌！'};
  t.textContent=n<=5?(msgs[n]||`🔥×${n} 连续正确！`):`🔥×${n} 连续正确！传奇！`;
  t.style.display='block';t.style.animation='none';
  requestAnimationFrame(()=>{t.style.animation='cIn 2.2s ease forwards';});
  setTimeout(()=>t.style.display='none',2300);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('sLogin').classList.contains('active'))startGame();
});
</script>
